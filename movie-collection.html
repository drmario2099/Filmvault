<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Film Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8c547;
    --accent2: #c43b3b;
    --text: #e8e8e8;
    --muted: #666;
    --green: #4caf7d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 2rem 3rem;
    display: flex;
    align-items: flex-end;
    gap: 2rem;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    line-height: 1;
  }

  .subtitle {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .stats {
    margin-left: auto;
    text-align: right;
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .stat-group { display: flex; gap: 2rem; }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    min-height: calc(100vh - 110px);
  }

  .panel {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  .panel:last-child { border-right: none; }

  .panel-header {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 110px;
    background: var(--bg);
    z-index: 10;
  }

  .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
  }

  .panel-title.collection { color: var(--green); }
  .panel-title.wishlist { color: var(--accent2); }

  .count-badge {
    font-size: 0.65rem;
    padding: 0.2rem 0.6rem;
    border-radius: 2px;
    letter-spacing: 0.1em;
    margin-left: auto;
  }

  .collection .count-badge { background: rgba(76,175,125,0.15); color: var(--green); border: 1px solid rgba(76,175,125,0.3); }
  .wishlist .count-badge { background: rgba(196,59,59,0.15); color: var(--accent2); border: 1px solid rgba(196,59,59,0.3); }

  .search-bar {
    padding: 0.8rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .search-bar input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text);
    letter-spacing: 0.05em;
  }

  .search-bar input::placeholder { color: var(--muted); }

  .film-list {
    overflow-y: auto;
    flex: 1;
    background: var(--bg);
  }

  .film-item {
    display: flex;
    align-items: center;
    padding: 0.85rem 2rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    gap: 1rem;
    transition: background 0.15s;
    cursor: default;
    background: var(--bg);
  }

  .film-item:hover { background: var(--surface); }

  .film-item.moving {
    animation: flashGreen 0.5s ease;
  }

  @keyframes flashGreen {
    0% { background: rgba(76,175,125,0.3); }
    100% { background: transparent; }
  }

  .film-index {
    font-size: 0.6rem;
    color: var(--muted);
    width: 2rem;
    text-align: right;
    flex-shrink: 0;
  }

  .film-info { flex: 1; min-width: 0; }

  .film-title {
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .film-director {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    font-style: italic;
    margin-top: 0.2rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Wishlist checkbox */
  .wish-check {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 2px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .wish-check:hover {
    border-color: var(--green);
    background: rgba(76,175,125,0.1);
  }

  .wish-check::after {
    content: '✓';
    font-size: 0.7rem;
    color: var(--green);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .wish-check:hover::after { opacity: 0.5; }

  /* Collection remove */
  .remove-btn {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.7rem;
    border-radius: 2px;
    transition: all 0.2s;
    opacity: 0;
  }

  .film-item:hover .remove-btn { opacity: 1; }
  .remove-btn:hover { color: var(--accent2); background: rgba(196,59,59,0.1); }

  .empty-state {
    padding: 4rem 2rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
  }

  .notification {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 0.8rem 1.5rem;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    border-radius: 2px;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
    white-space: nowrap;
  }

  .notification.show {
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 768px) {
    header { padding: 1.5rem; flex-wrap: wrap; }
    h1 { font-size: 2.5rem; }
    .container { grid-template-columns: 1fr; }
    .panel { border-right: none; border-bottom: 1px solid var(--border); min-height: 50vh; }
    .panel-header { top: 0; }
    .film-list { max-height: 60vh; }
  }
</style>
</head>

</div>

  { title: "The Truman Show", director: "Peter Weir" },
  { title: "The Untouchables", director: "Brian De Palma" },
  { title: "The Usual Suspects", director: "Bryan Singer" },
  { title: "The Witch", director: "Robert Eggers" },
  { title: "The Wolf of Wall Street", director: "Martin Scorsese" },
  { title: "They Live", director: "John Carpenter" },
  { title: "Thief", director: "Michael Mann" },
  { title: "Top Gun: Maverick", director: "Joseph Kosinski" },
  { title: "Total Recall", director: "Paul Verhoeven" },
  { title: "Toy Story", director: "John Lasseter" },
  { title: "Train to Busan", director: "Yeon Sang-ho" },
  { title: "Trainspotting", director: "Danny Boyle" },
  { title: "Uncut Gems", director: "Josh & Benny Safdie" },
  { title: "Vertigo", director: "Alfred Hitchcock" },
  { title: "WALL-E", director: "Andrew Stanton" },
  { title: "Watchmen", director: "Zack Snyder" },
  { title: "Zack Snyder's Justice League", director: "Zack Snyder" },
  { title: "Zodiac", director: "David Fincher" },
];

// Load from localStorage or use initial data
let collection = JSON.parse(localStorage.getItem(COLLECTION_KEY)) || initialCollection;
let wishlist = JSON.parse(localStorage.getItem(WISHLIST_KEY)) || initialWishlist;

function save() {
  localStorage.setItem(COLLECTION_KEY, JSON.stringify(collection));
  localStorage.setItem(WISHLIST_KEY, JSON.stringify(wishlist));
}

function showNotification(msg) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function moveToCollection(title) {
  const idx = wishlist.findIndex(f => f.title === title);
  if (idx === -1) return;
  const film = wishlist.splice(idx, 1)[0];
  collection.push(film);
  collection.sort((a, b) => a.title.localeCompare(b.title));
  save();
  renderAll();
  showNotification(`✓ "${film.title}" added to Collection`);
}

function removeFromCollection(title) {
  const idx = collection.findIndex(f => f.title === title);
  if (idx === -1) return;
  const film = collection.splice(idx, 1)[0];
  wishlist.push(film);
  wishlist.sort((a, b) => a.title.localeCompare(b.title));
  save();
  renderAll();
  showNotification(`↩ "${film.title}" moved back to Wishlist`);
}

function renderList(films, containerId, type, searchVal) {
  const container = document.getElementById(containerId);
  const filtered = searchVal
    ? films.filter(f => f.title.toLowerCase().includes(searchVal.toLowerCase()) || f.director.toLowerCase().includes(searchVal.toLowerCase()))
    : films;

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">— no films found —</div>`;
    return;
  }

  container.innerHTML = filtered.map((film, i) => `
    <div class="film-item" id="film-${film.title.replace(/[^a-z0-9]/gi,'_')}">
      <span class="film-index">${String(i + 1).padStart(2, '0')}</span>
      <div class="film-info">
        <div class="film-title">${film.title}</div>
        <div class="film-director">${film.director}</div>
      </div>
      ${type === 'wishlist'
        ? `<div class="wish-check" title="Add to Collection" onclick="moveToCollection('${film.title.replace(/'/g, "\\'")}')"></div>`
        : `<div class="remove-btn" title="Move back to Wishlist" onclick="removeFromCollection('${film.title.replace(/'/g, "\\'")}')">↩</div>`
      }
    </div>
  `).join('');
}

function renderAll() {
  const collSearch = document.getElementById('collSearch').value;
  const wishSearch = document.getElementById('wishSearch').value;

  renderList(collection, 'collectionList', 'collection', collSearch);
  renderList(wishlist, 'wishlistList', 'wishlist', wishSearch);

  document.getElementById('collectionCount').textContent = collection.length;
  document.getElementById('wishlistCount').textContent = wishlist.length;
  document.getElementById('collBadge').textContent = `${collection.length} films`;
  document.getElementById('wishBadge').textContent = `${wishlist.length} films`;
}

renderAll();
</script>
</body>
</html>
